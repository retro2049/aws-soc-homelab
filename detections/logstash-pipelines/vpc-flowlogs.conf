input {
  s3 {
    bucket       => "bucket_name"
    prefix       => "audit_logs"
    region       => "region"
    interval     => 60
    sincedb_path => "/var/lib/logstash/sincedb_flowlogs"
    add_field    => { "[@metadata][log_type]" => "flowlog" }
  }
  s3 {
    bucket       => "bucket_name"
    prefix       => "audit_logs"
    region       => "region"
    interval     => 60
    sincedb_path => "/var/lib/logstash/sincedb_flowlogs_sec"
    add_field    => { "[@metadata][log_type]" => "flowlog" }
  }
}

filter {
  if [@metadata][log_type] == "flowlog" {
    # Skip header
    if [message] =~ /^version\s+account-id/ {
      drop {}
    }
    # Skip NODATA / SKIPDATA records (they contain "-" placeholders)
    if [message] =~ /NODATA/ or [message] =~ /SKIPDATA/ {
      drop {}
    }

    grok {
      match => { "message" => "%{NUMBER:version} %{NUMBER:account_id} %{NOTSPACE:interface_id} %{NOTSPACE:src_addr} %{NOTSPACE:dst_addr} %{NOTSPACE:src_port} %{NOTSPACE:dst_port} %{NOTSPACE:protocol} %{NOTSPACE:packets} %{NOTSPACE:bytes} %{NUMBER:start_time} %{NUMBER:end_time} %{NOTSPACE:action} %{NOTSPACE:log_status}" }
    }

    # Only convert when the value is actually numeric (not "-")
    if [src_port] =~ /^\d+$/ { mutate { convert => { "src_port" => "integer" } } }
    if [dst_port] =~ /^\d+$/ { mutate { convert => { "dst_port" => "integer" } } }
    if [protocol] =~ /^\d+$/ { mutate { convert => { "protocol" => "integer" } } }
    if [packets]  =~ /^\d+$/ { mutate { convert => { "packets"  => "integer" } } }
    if [bytes]    =~ /^\d+$/ { mutate { convert => { "bytes"    => "integer" } } }

    date {
      match  => ["start_time", "UNIX"]
      target => "@timestamp"
    }

    if [action] == "REJECT" { mutate { add_tag => ["blocked"] } }
    if [dst_port] in [22, 3389, 445, 1433, 3306, 5985, 5986] {
      mutate { add_tag => ["sensitive_port"] }
    }
    if [src_addr] =~ /^10\.0\./ or [dst_addr] =~ /^10\.0\./ {
      mutate { add_tag => ["internal__vpn_traffic"] }
    }
  }
}

output {
  if [@metadata][log_type] == "flowlog" {
    elasticsearch {
      hosts       => ["https://localhost:9200"]
      index       => "vpc-flowlogs-%{+YYYY.MM.dd}"
      user        => "user"
      password    => "pass"
      ssl_enabled => true
      ssl_certificate_authorities => ["/etc/logstash/http_ca.crt"]
    }
  }
}
